name: Convert ODT → FODT + PDF

on:
  push:
    paths:
      - 'manifest/*.odt'
      - 'translations/Persian/*.odt'           # Add other folders

permissions:
  contents: write

jobs:
  generate-pdf:
    name: Generate PDF
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        folder: ['manifest', 'translations/Persian']  # List your folders here
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice + Fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer \
            fonts-dejavu \
            fonts-liberation

      - name: Convert to PDF + Commit
        run: |
          cd ${{ matrix.folder }}
          shopt -s nullglob

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for file in *.odt; do
            base=$(basename "$file" .odt)

            # convert to PDF
            libreoffice --headless --norestore --nolockcheck \
              -env:UserInstallation=file:///tmp/lo-profile \
              --convert-to pdf "$file"

            git add "${base}.pdf"
            git commit -m "Human Readable: auto-generate ${base}.pdf from ${file}" || echo "No changes for ${base}.pdf"
          done

          git pull --rebase
          git push
        continue-on-error: true

  generate-fodt:
    name: Generate FODT
    runs-on: ubuntu-22.04
    needs: generate-pdf
    strategy:
      matrix:
        folder: ['manifest', 'translations/Persian']  # Same folders as above
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to FODT + Commit
        run: |
          cd ${{ matrix.folder }}
          shopt -s nullglob

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for file in *.odt; do
            base=$(basename "$file" .odt)

            # convert to FODT
            libreoffice --headless --norestore --nolockcheck \
              -env:UserInstallation=file:///tmp/lo-profile \
              --convert-to fodt "$file"

            git add "${base}.fodt"
            git commit -m "Machine Readable: auto-generate ${base}.fodt from ${file}" || echo "No changes for ${base}.fodt"
          done

          git pull --rebase
          git push
        continue-on-error: true
