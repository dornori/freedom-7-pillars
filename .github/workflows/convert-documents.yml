name: Convert ODT → FODT + PDF

on:
  workflow_dispatch:   # ← Manual trigger only

permissions:
  contents: write

jobs:
  generate-fodt:
    name: Generate FODT
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to FODT + Commit
        run: |
          cd manifest
          libreoffice --headless --convert-to fodt freedom-framework.odt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add freedom-framework.fodt
          git commit -m "chore: Auto-generate .fodt from .odt" || echo "No changes for .fodt"
          git push
        continue-on-error: true

  generate-pdf:
    name: Generate PDF
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to PDF + Commit
        run: |
          cd manifest
          libreoffice --headless --convert-to pdf freedom-framework.odt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add freedom-framework.pdf
          git commit -m "chore: Auto-generate .pdf from .odt" || echo "No changes for .pdf"
          git push
        continue-on-error: true
