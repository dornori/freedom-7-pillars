name: Convert ODT → FODT + PDF

on:
  push:
    paths:
      - 'manifest/*.odt'   # triggers when any .odt file is added/changed

permissions:
  contents: write

jobs:
  generate:
    name: Generate FODT + PDF
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to FODT + PDF + Commit
        run: |
          cd manifest

          for file in *.odt; do
            libreoffice --headless --convert-to fodt "$file"
            libreoffice --headless --convert-to pdf "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.fodt *.pdf
          git commit -m "chore: auto-convert .odt → .fodt + .pdf" || echo "No changes"
          git push
