name: Convert ODT → FODT + PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest/freedom-framework.odt'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert-fodt:
    name: Generate FODT (for diffs)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libreoffice libreoffice-writer

      - name: Convert to FODT
        run: |
          cd manifest
          libreoffice --headless --convert-to fodt freedom-framework.odt

      - name: Create PR for FODT
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: Auto-generate .fodt from .odt"
          title: "chore: Auto-generate .fodt"
          body: "Automatically generated `.fodt` file for better Git diffs and collaboration."
          branch: auto-generate-fodt
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: manifest/freedom-framework.fodt

  convert-pdf:
    name: Generate PDF
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libreoffice libreoffice-writer

      - name: Convert to PDF
        run: |
          cd manifest
          libreoffice --headless --convert-to pdf freedom-framework.odt

      - name: Create PR for PDF
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: Auto-generate .pdf from .odt"
          title: "chore: Auto-generate .pdf"
          body: "Automatically generated clean `.pdf` version for easy reading and distribution."
          branch: auto-generate-pdf
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: manifest/freedom-framework.pdf
