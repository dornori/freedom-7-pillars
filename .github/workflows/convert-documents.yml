name: Convert ODT → FODT + PDF

on:
  push:
    paths:
      - 'manifest/*.odt'

permissions:
  contents: write

jobs:
  generate-pdf:
    name: Generate PDF
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice + Fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer \
            fonts-dejavu \
            fonts-liberation

      - name: Convert to PDF + Commit
        run: |
          cd manifest

          for file in *.odt; do
            libreoffice --headless --norestore --nolockcheck \
              -env:UserInstallation=file:///tmp/lo-profile \
              --convert-to pdf "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.pdf
          git commit -m "Human Readable: Latest Version (.pdf from .odt)" || echo "No changes"

          git pull --rebase
          git push
        continue-on-error: true

  generate-fodt:
    name: Generate FODT
    runs-on: ubuntu-22.04
    needs: generate-pdf

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to FODT + Commit
        run: |
          cd manifest

          for file in *.odt; do
            libreoffice --headless --norestore --nolockcheck \
              -env:UserInstallation=file:///tmp/lo-profile \
              --convert-to fodt "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.fodt
          git commit -m "Machine Readable: Latest Version (.fodt from .odt)" || echo "No changes"

          git pull --rebase
          git push
        continue-on-error: true
