name: Convert ODT → FODT + PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest/freedom-framework.odt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache LibreOffice
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /usr/lib/libreoffice
            /usr/share/libreoffice
          key: ${{ runner.os }}-libreoffice-2026-04
          restore-keys: |
            ${{ runner.os }}-libreoffice-

      - name: Install LibreOffice (only if not cached)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert ODT to FODT and PDF
        run: |
          cd manifest
          echo "Starting conversion..."
          libreoffice --headless --convert-to fodt freedom-framework.odt
          libreoffice --headless --convert-to pdf freedom-framework.odt
          echo "Conversion completed:"
          ls -la

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase origin main || echo "No remote changes"
          
          git add manifest/freedom-framework.fodt manifest/freedom-framework.pdf || true
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: Auto-generate .fodt and .pdf from .odt [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
