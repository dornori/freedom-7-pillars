name: Convert ODT → FODT + PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest/freedom-framework.odt'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache LibreOffice
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /usr/lib/libreoffice
            /usr/share/libreoffice
          key: ${{ runner.os }}-libreoffice-v1
          restore-keys: ${{ runner.os }}-libreoffice-

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert ODT to FODT and PDF
        run: |
          cd manifest
          echo "🔄 Converting freedom-framework.odt ..."
          
          libreoffice --headless --convert-to fodt freedom-framework.odt
          libreoffice --headless --convert-to pdf  freedom-framework.odt
          
          echo "✅ Conversion completed:"
          ls -la

      - name: Create Pull Request with generated files
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: Auto-generate .fodt and .pdf from .odt [skip ci]"
          title: "chore: Auto-generate .fodt and .pdf"
          body: |
            Automatically generated files from the latest `freedom-framework.odt`:

            - `freedom-framework.fodt` → Better for Git diffs and collaboration
            - `freedom-framework.pdf` → Clean version for readers

            This PR was created by the document conversion workflow.
          branch: auto-generate-documents
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            manifest/freedom-framework.fodt
            manifest/freedom-framework.pdf
