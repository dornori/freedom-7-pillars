name: Convert ODT → FODT + PDF

on:
  push:
    paths:
      - 'manifest/*.odt'

permissions:
  contents: write

jobs:
  generate-fodt:
    name: Generate FODT
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to FODT + Commit
        run: |
          cd manifest

          for file in *.odt; do
            libreoffice --headless --convert-to fodt "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.fodt
          git commit -m "MACHINE READABLE: Latest version .fodt from .odt" || echo "No changes"
          git push
        continue-on-error: true

  generate-pdf:
    name: Generate PDF
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert to PDF + Commit
        run: |
          cd manifest

          for file in *.odt; do
            libreoffice --headless --convert-to pdf "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.pdf
          git commit -m "HUMAN READABLE: Latest version .pdf from .odt" || echo "No changes"
          git push
        continue-on-error: true
