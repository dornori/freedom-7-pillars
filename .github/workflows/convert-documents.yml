name: Convert ODT → FODT + PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest/freedom-framework.odt'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0
      token: ${{ secrets.GITHUB_TOKEN }}

  - name: Install LibreOffice
    run: |
      sudo apt-get update -qq
      sudo apt-get install -y --no-install-recommends \
        libreoffice \
        libreoffice-writer

  - name: Convert ODT to FODT and PDF
    run: |
      cd manifest
      echo "Converting freedom-framework.odt..."
      libreoffice --headless --convert-to fodt freedom-framework.odt
      libreoffice --headless --convert-to pdf freedom-framework.odt
      echo "Conversion completed:"
      ls -la

  - name: Commit FODT file
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add manifest/freedom-framework.fodt
      git commit -m "chore: Auto-generate .fodt from .odt" || echo "No changes to commit"

  - name: Commit PDF file
    run: |
      git add manifest/freedom-framework.pdf
      git commit -m "chore: Auto-generate .pdf from .odt" || echo "No changes to commit"

  - name: Create Pull Request
    uses: peter-evans/create-pull-request@v7
    with:
      title: "chore: Auto-generate .fodt and .pdf from latest ODT"
      body: |
        Automatically generated `.fodt` (for better diffs) and `.pdf` files 
        from the latest `freedom-framework.odt`.

        This PR was created by the document conversion workflow.
      branch: auto-generate-documents
      delete-branch: true
      token: ${{ secrets.GITHUB_TOKEN }}
