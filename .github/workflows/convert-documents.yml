name: Convert ODT → FODT + PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'manifest/freedom-framework.odt'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libreoffice \
            libreoffice-writer

      - name: Convert ODT to FODT and PDF
        run: |
          cd manifest
          echo "Converting freedom-framework.odt..."
          libreoffice --headless --convert-to fodt freedom-framework.odt
          libreoffice --headless --convert-to pdf freedom-framework.odt
          echo "Conversion done:"
          ls -la

      - name: Create Pull Request with generated files
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: Auto-generate .fodt and .pdf from .odt"
          title: "chore: Auto-generate .fodt and .pdf from latest .odt"
          body: |
            Automatically generated `.fodt` and `.pdf` files from `freedom-framework.odt`.

            This PR was created by the document conversion workflow.
          branch: auto-update-documents
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            manifest/freedom-framework.fodt
            manifest/freedom-framework.pdf
